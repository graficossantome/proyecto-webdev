<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<form action="https://ejemplo.com/inscripcion" method="post">

    <label for="nombre">Nombre completo</label>
    <input type="text" name="nombre" id="nombre" required>

    <label for="email">Tu correo electrónico</label>
    <input type="email" name="email" id="email" required>

    <label for="phone">Tu número de teléfono</label>
    <input type="tel" name="phone" id="phone" required>

    <fieldset>
        <legend>Nivel de experiencia</legend>
        <label>
            <input type="radio" name="principiante" id="principiante" value="priniciante">
        </label>
        <label>
            <input type="radio" name="intermedio" id="intermedio" value="intermedio">
        </label>
        <label>
            <input type="radio" name="avanzado" id="avanzado" value="avanzado">
        </label>
    </fieldset>

    <label for="horario">Selecciona tu horario</label>
    <select name="horario" id="horario">
        <option value="Mañana (9:00-12:00)"></option>
        <option value="Tarde (16:00-19:00)"></option>
        <option value="Noche (20:00-22:00)"></option>
    </select>

    <label for="comentarios">Comentarios adicionales</label>
    <textarea name="comentarios" id="comentarios" rows="2" cols="10" placeholder="Desembucha, bravucón"></textarea>

    <button type="submit">DALE</button>
</form>

</body>
</html>
