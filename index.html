<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <caption>Menú semanal</caption>
        <thead>
            <tr>
                <th scope="col">Día</th>
                <th scope="col">Primer plato</th>
                <th scope="col">Segundo plato</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">Lunes</th>
                <td>Lentejas</td>
                <td>Pollo</td>
            </tr>
            <tr>
                <th scope="row">Martes</th>
                <td>Caldo</td>
                <td>Carne</td>
            </tr>
            <tr>
                <th scope="row">Miércoles</th>
                <td>Callos</td>
                <td>Pescado</td>
            </tr>
            <tr>
                <th scope="row">Jueves</th>
                <td>Sopa</td>
                <td>Hamburguesa</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="3">Menú sujeto a cambios</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
