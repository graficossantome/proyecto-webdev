<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/contacto" method="GET">

    <label for="nombre">Nombre completo</label>
    <input type="text" name="nombre" id="nombre" required>

    <label for="mensaje">Tu mensaje</label>
    <textarea name="mensaje" id="mensaje" rows="2" cols="2" placeholder="Dinos qué opinas"></textarea>

    <fieldset>
        <legend>¿Cómo prefieres que te contactemos?</legend>
        <label>
            <input type="radio" name="contacto" value="email"> Email
        </label>
        <label>
            <input type="radio" name="contacto" value="telefono"> Teléfono
        </label>
        <label>
            <input type="radio" name="contacto" value="whatsapp"> WhatsApp
        </label>
    </fieldset>

    <label for="asunto">Asunto</label>
    <select id="asunto">
        <option value="consulta">Consulta general</option>
        <option value="soporte">Soporte técnico</option>
        <option value="presupuesto">Solicitar presupuesto</option>
    </select>

    <button type="submit">Enviar</button>
</form>
</body>
</html>
